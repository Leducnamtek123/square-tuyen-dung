# =============================================================================
# docker-compose.yml — BASE (shared across dev & prod)
# =============================================================================
# Usage:
#   Dev:  docker compose up                    (auto-loads override.yml)
#   Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - square-network

  # ---------------------------------------------------------------------------
  # Backend (Django)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./api
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - SERVICE_REDIS_HOST=redis
      - SERVICE_REDIS_PORT=6379
      - SERVICE_REDIS_DB=0
      - LIVEKIT_URL=http://livekit:7880
      - LIVEKIT_AGENT_NAME=square-ai-interviewer
    networks:
      - square-network

  # ---------------------------------------------------------------------------
  # Celery Worker
  # ---------------------------------------------------------------------------
  celery-worker:
    build:
      context: ./api
    env_file:
      - .env
    working_dir: /api
    command: celery -A config.celery worker --pool=prefork --loglevel=info
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - SERVICE_REDIS_HOST=redis
      - SERVICE_REDIS_PORT=6379
    networks:
      - square-network

  # ---------------------------------------------------------------------------
  # Celery Beat
  # ---------------------------------------------------------------------------
  celery-beat:
    build:
      context: ./api
    env_file:
      - .env
    working_dir: /api
    command: celery -A config.celery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - SERVICE_REDIS_HOST=redis
      - SERVICE_REDIS_PORT=6379
    networks:
      - square-network

  # ---------------------------------------------------------------------------
  # MySQL Database
  # ---------------------------------------------------------------------------
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_NAME:-square_db}
    volumes:
      - db_data:/var/lib/mysql
      - ./tuyendungsqstudio.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - square-network

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - square-network

  # ---------------------------------------------------------------------------
  # LiveKit Server
  # ---------------------------------------------------------------------------
  livekit:
    image: livekit/livekit-server:latest
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-secret}"
    volumes:
      - ./voice-ai/livekit.yaml:/etc/livekit.yaml
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - square-network

  # ---------------------------------------------------------------------------
  # Vietnamese TTS
  # ---------------------------------------------------------------------------
  vieneu-tts:
    build:
      context: ./voice-ai/inference/vieneu-text-to-speech
    environment:
      - PORT=8298
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    restart: unless-stopped
    networks:
      - square-network

  # ---------------------------------------------------------------------------
  # Whisper STT
  # ---------------------------------------------------------------------------
  whisper:
    build:
      context: ./voice-ai/inference/whisper
    volumes:
      - whisper-data:/data
    environment:
      - VOXBOX_HF_REPO_ID=${VOXBOX_HF_REPO_ID:-Systran/faster-whisper-medium}
      - VOXBOX_DEVICE=${VOXBOX_DEVICE:-cpu}
      - DATA_DIR=/data
    restart: unless-stopped
    networks:
      - square-network

  # ---------------------------------------------------------------------------
  # LLaMA.cpp (LLM inference)
  # ---------------------------------------------------------------------------
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    command:
      - --host
      - 0.0.0.0
      - --port
      - "11434"
      - --hf-repo
      - "${LLAMA_HF_REPO:-Qwen/Qwen2-7B-Instruct-GGUF}"
      - --alias
      - "${LLAMA_MODEL_ALIAS:-qwen2-7b}"
    volumes:
      - ./voice-ai/inference/llama/models:/models
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:11434/v1/models > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    networks:
      - square-network

  # ---------------------------------------------------------------------------
  # LiveKit Agent
  # ---------------------------------------------------------------------------
  livekit-agent:
    build:
      context: ./voice-ai/livekit_agent
    volumes:
      - ./voice-ai/livekit_agent/src:/app/src
    environment:
      - NUM_IDLE_PROCESSES=${NUM_IDLE_PROCESSES:-1}
      - BACKEND_API_URL=http://backend:8001/api
      - AUTO_END_ON_COMPLETION=${AUTO_END_ON_COMPLETION:-0}
      - LIVEKIT_URL=http://livekit:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
      - TTS_VOICE=${TTS_VOICE:-Bình (nam miền Bắc)}
      - LLAMA_BASE_URL=http://llama-cpp:11434/v1
      - STT_BASE_URL=http://whisper:8080/v1
      - TTS_BASE_URL=http://vieneu-tts:8298/v1
    depends_on:
      - backend
      - livekit
      - vieneu-tts
      - whisper
      - llama-cpp
    restart: unless-stopped
    networks:
      - square-network

  # ---------------------------------------------------------------------------
  # MinIO (Object Storage)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-password}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-http://localhost:9001}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-http://minio:9000}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped
    networks:
      - square-network

# =============================================================================
# Shared resources
# =============================================================================
networks:
  square-network:
    driver: bridge

volumes:
  db_data:
  huggingface-cache:
  whisper-data:
  minio-data:
