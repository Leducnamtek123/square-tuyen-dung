# =============================================================================
# docker-compose.yml — CONSOLIDATED CONFIGURATION
# =============================================================================
# This file is the single source of truth for all services.
# It is designed to be production-ready by default.
# Use .env for environment-specific settings.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Nginx Gateway
  # ---------------------------------------------------------------------------
  nginx-gateway:
    container_name: tuyendung-studio-nginx-gateway
    build:
      context: ./nginx-gateway
    ports:
      - "${NGINX_PORT:-8080}:80"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
      livekit:
        condition: service_healthy
      minio:
        condition: service_started
    restart: always
    networks:
      - proxy-net

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------
  frontend:
    container_name: tuyendung-studio-frontend
    build:
      context: ./frontend
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile.prod}
      args:
        NEXT_PUBLIC_NODE_ENV: ${NEXT_PUBLIC_NODE_ENV:-production}
        NEXT_PUBLIC_PROJECT_HOST_NAME: ${NEXT_PUBLIC_PROJECT_HOST_NAME:-tuyendung.square.vn}
        NEXT_PUBLIC_ADMIN_PROJECT_HOST_NAME: ${NEXT_PUBLIC_ADMIN_PROJECT_HOST_NAME:-admin.tuyendung.square.vn}
        NEXT_PUBLIC_EMPLOYER_PROJECT_HOST_NAME: ${NEXT_PUBLIC_EMPLOYER_PROJECT_HOST_NAME:-employer.tuyendung.square.vn}
        NEXT_PUBLIC_PROJECT_SERVER_CLIENT_ID: ${NEXT_PUBLIC_PROJECT_SERVER_CLIENT_ID:-${CLIENT_ID}}
        NEXT_PUBLIC_PROJECT_SERVER_CLIENT_SECRET: ${NEXT_PUBLIC_PROJECT_SERVER_CLIENT_SECRET:-${CLIENT_SECRET}}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_GOOGLE_CLIENT_SECRET: ${NEXT_PUBLIC_GOOGLE_CLIENT_SECRET}
        NEXT_PUBLIC_FACEBOOK_CLIENT_ID: ${NEXT_PUBLIC_FACEBOOK_CLIENT_ID:-}
        NEXT_PUBLIC_FACEBOOK_CLIENT_SECRET: ${NEXT_PUBLIC_FACEBOOK_CLIENT_SECRET:-}
        NEXT_PUBLIC_GOONGAPI_KEY: ${NEXT_PUBLIC_GOONGAPI_KEY}
        NEXT_PUBLIC_GOONGAPI_ACCESS_TOKEN: ${NEXT_PUBLIC_GOONGAPI_ACCESS_TOKEN:-}
        NEXT_PUBLIC_MINIO_PUBLIC_URL: ${NEXT_PUBLIC_MINIO_PUBLIC_URL:-https://s3.tuyendung.square.vn:4433}
        NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-wss://tuyendung.square.vn/livekit}
        NEXT_PUBLIC_FRAPPE_HR_PUBLIC_URL: ${NEXT_PUBLIC_FRAPPE_HR_PUBLIC_URL:-https://hrm.square.vn}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
        NEXT_PUBLIC_FIREBASE_DATABASE_URL: ${NEXT_PUBLIC_FIREBASE_DATABASE_URL}
        NEXT_PUBLIC_FIREBASE_FORCE_LONG_POLLING: ${NEXT_PUBLIC_FIREBASE_FORCE_LONG_POLLING}
    env_file:
      - .env
    expose:
      - "80"
    restart: always
    networks:
      - proxy-net

  # ---------------------------------------------------------------------------
  # Backend (Django)
  # ---------------------------------------------------------------------------
  backend:
    container_name: tuyendung-studio-backend
    build:
      context: ./api
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile.prod}
    command: ${BACKEND_COMMAND:-sh docker-entrypoint.sh gunicorn --bind 0.0.0.0:8000 --workers 3 --worker-class gevent --timeout 120 config.wsgi:application}
    env_file:
      - .env
    expose:
      - "8000"
    restart: always
    environment:
      - DEBUG=${DEBUG:-False}
      - AUTO_MIGRATE=${AUTO_MIGRATE:-1}
      - INTERVIEW_AGENT_SHARED_SECRET=${INTERVIEW_AGENT_SHARED_SECRET:?Set INTERVIEW_AGENT_SHARED_SECRET in .env and share it with livekit-agent}
      - INTERVIEW_AGENT_AUTH_REQUIRED=${INTERVIEW_AGENT_AUTH_REQUIRED:-True}
      - INTERVIEW_AGENT_AUTH_MAX_SKEW_SECONDS=${INTERVIEW_AGENT_AUTH_MAX_SKEW_SECONDS:-300}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -H 'X-Forwarded-Proto: https' http://localhost:8000/api/common/health/ > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - proxy-net
      - app-net
      - data-net

  # ---------------------------------------------------------------------------
  # Migration (run once per deploy)
  # ---------------------------------------------------------------------------
  migrate:
    container_name: tuyendung-studio-migrate
    build:
      context: ./api
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile.prod}
    command: sh docker-entrypoint.sh true
    env_file:
      - .env
    environment:
      - DEBUG=${DEBUG:-False}
      - AUTO_MIGRATE=${AUTO_MIGRATE:-1}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net
      - data-net

  # ---------------------------------------------------------------------------
  # Celery Worker
  # ---------------------------------------------------------------------------
  celery-worker:
    container_name: tuyendung-studio-celery-worker
    build:
      context: ./api
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile.prod}
    command: celery -A config worker -l info --concurrency=${CELERY_WORKER_CONCURRENCY:-2} --prefetch-multiplier=${CELERY_WORKER_PREFETCH_MULTIPLIER:-1} -Ofair
    env_file:
      - .env
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net
      - data-net

  # ---------------------------------------------------------------------------
  # Celery Beat
  # ---------------------------------------------------------------------------
  celery-beat:
    container_name: tuyendung-studio-celery-beat
    build:
      context: ./api
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile.prod}
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net
      - data-net

  # ---------------------------------------------------------------------------
  # MySQL Database
  # ---------------------------------------------------------------------------
  db:
    container_name: tuyendung-studio-db
    image: public.ecr.aws/docker/library/mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MYSQL_DATABASE: ${DB_NAME:-square_db}
    volumes:
      - db_data:/var/lib/mysql
      - ./tuyendungsqstudio.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:?Set DB_PASSWORD in .env}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always
    networks:
      - data-net

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    container_name: tuyendung-studio-redis
    image: public.ecr.aws/docker/library/redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - data-net

  # ---------------------------------------------------------------------------
  # Frappe HRMS (external HRM system, enabled with --profile frappe-hrm)
  # ---------------------------------------------------------------------------
  frappe-hrms-backend:
    container_name: tuyendung-studio-frappe-hrms-backend
    image: ${FRAPPE_HR_IMAGE:-square/frappe-hrms:custom}
    build:
      context: .
      dockerfile: infra/frappe-hrms/Containerfile
      args:
        FRAPPE_BRANCH: ${FRAPPE_HR_FRAPPE_BRANCH:-version-16}
        FRAPPE_IMAGE_PREFIX: ${FRAPPE_HR_IMAGE_PREFIX:-frappe}
        CACHE_BUST: ${FRAPPE_HR_BUILD_CACHE_BUST:-}
    profiles: ["frappe-hrm"]
    environment:
      DB_HOST: frappe-hrms-db
      DB_PORT: "3306"
      MYSQL_ROOT_PASSWORD: ${FRAPPE_HR_DB_ROOT_PASSWORD:?Set FRAPPE_HR_DB_ROOT_PASSWORD in .env}
      MARIADB_ROOT_PASSWORD: ${FRAPPE_HR_DB_ROOT_PASSWORD:?Set FRAPPE_HR_DB_ROOT_PASSWORD in .env}
    volumes:
      - frappe-hrms-sites:/home/frappe/frappe-bench/sites
      - frappe-hrms-logs:/home/frappe/frappe-bench/logs
    restart: unless-stopped
    networks:
      - frappe-hrms-net

  frappe-hrms-configurator:
    container_name: tuyendung-studio-frappe-hrms-configurator
    image: ${FRAPPE_HR_IMAGE:-square/frappe-hrms:custom}
    profiles: ["frappe-hrm"]
    entrypoint:
      - bash
      - -c
    command:
      - |
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: frappe-hrms-db
      DB_PORT: "3306"
      REDIS_CACHE: frappe-hrms-redis-cache:6379
      REDIS_QUEUE: frappe-hrms-redis-queue:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - frappe-hrms-sites:/home/frappe/frappe-bench/sites
      - frappe-hrms-logs:/home/frappe/frappe-bench/logs
    depends_on:
      frappe-hrms-db:
        condition: service_healthy
      frappe-hrms-redis-cache:
        condition: service_started
      frappe-hrms-redis-queue:
        condition: service_started
    restart: "no"
    networks:
      - frappe-hrms-net

  frappe-hrms-create-site:
    container_name: tuyendung-studio-frappe-hrms-create-site
    image: ${FRAPPE_HR_IMAGE:-square/frappe-hrms:custom}
    profiles: ["frappe-hrm"]
    entrypoint:
      - bash
      - -c
    command:
      - |
        wait-for-it frappe-hrms-db:3306 -t 180;
        wait-for-it frappe-hrms-redis-cache:6379 -t 180;
        wait-for-it frappe-hrms-redis-queue:6379 -t 180;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] &&
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] &&
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
        do
          echo "Waiting for sites/common_site_config.json to be created";
          sleep 5;
          if (( `date +%s`-start > 180 )); then
            echo "could not find sites/common_site_config.json with required keys";
            exit 1;
          fi
        done;
        if [ ! -d "sites/$${FRAPPE_SITE_NAME}" ]; then
          bench new-site --mariadb-user-host-login-scope='%' --admin-password="$${ADMIN_PASSWORD}" --db-root-username=root --db-root-password="$${DB_ROOT_PASSWORD}" --install-app erpnext --install-app hrms --install-app square_hrm_branding --set-default "$${FRAPPE_SITE_NAME}";
        else
          echo "Frappe HR site already exists: $${FRAPPE_SITE_NAME}";
          bench --site "$${FRAPPE_SITE_NAME}" migrate;
          if ! bench --site "$${FRAPPE_SITE_NAME}" list-apps | grep -qx erpnext; then
            bench --site "$${FRAPPE_SITE_NAME}" install-app erpnext;
          fi
          if ! bench --site "$${FRAPPE_SITE_NAME}" list-apps | grep -qx hrms; then
            bench --site "$${FRAPPE_SITE_NAME}" install-app hrms;
          fi
          if ! bench --site "$${FRAPPE_SITE_NAME}" list-apps | grep -qx square_hrm_branding; then
            bench --site "$${FRAPPE_SITE_NAME}" install-app square_hrm_branding;
          fi
          bench --site "$${FRAPPE_SITE_NAME}" migrate;
        fi
        bench --site "$${FRAPPE_SITE_NAME}" execute frappe.db.set_default --args "['desktop:home_page','workspace']";
        bench --site "$${FRAPPE_SITE_NAME}" clear-cache;
    environment:
      FRAPPE_SITE_NAME: ${FRAPPE_HR_SITE_NAME:-hrm.tuyendung.square.vn}
      ADMIN_PASSWORD: ${FRAPPE_HR_ADMIN_PASSWORD:?Set FRAPPE_HR_ADMIN_PASSWORD in .env}
      DB_ROOT_PASSWORD: ${FRAPPE_HR_DB_ROOT_PASSWORD:?Set FRAPPE_HR_DB_ROOT_PASSWORD in .env}
    volumes:
      - frappe-hrms-sites:/home/frappe/frappe-bench/sites
      - frappe-hrms-logs:/home/frappe/frappe-bench/logs
    depends_on:
      frappe-hrms-configurator:
        condition: service_completed_successfully
    restart: "no"
    networks:
      - frappe-hrms-net

  frappe-hrms-db:
    container_name: tuyendung-studio-frappe-hrms-db
    image: mariadb:11.8
    profiles: ["frappe-hrm"]
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: ${FRAPPE_HR_DB_ROOT_PASSWORD:?Set FRAPPE_HR_DB_ROOT_PASSWORD in .env}
      MARIADB_ROOT_PASSWORD: ${FRAPPE_HR_DB_ROOT_PASSWORD:?Set FRAPPE_HR_DB_ROOT_PASSWORD in .env}
    volumes:
      - frappe-hrms-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    networks:
      - frappe-hrms-net

  frappe-hrms-frontend:
    container_name: tuyendung-studio-frappe-hrms-frontend
    image: ${FRAPPE_HR_IMAGE:-square/frappe-hrms:custom}
    profiles: ["frappe-hrm"]
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: frappe-hrms-backend:8000
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_HR_SITE_NAME:-hrm.tuyendung.square.vn}
      SOCKETIO: frappe-hrms-websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 100m
    ports:
      - "${FRAPPE_HR_PORT:-8081}:8080"
    volumes:
      - frappe-hrms-sites:/home/frappe/frappe-bench/sites
      - frappe-hrms-logs:/home/frappe/frappe-bench/logs
    depends_on:
      frappe-hrms-websocket:
        condition: service_started
      frappe-hrms-create-site:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      proxy-net:
        aliases:
          - frappe-hrms
          - hrm.tuyendung.square.vn
      app-net:
        aliases:
          - frappe-hrms-frontend
      frappe-hrms-net: {}

  frappe-hrms-queue-long:
    container_name: tuyendung-studio-frappe-hrms-queue-long
    image: ${FRAPPE_HR_IMAGE:-square/frappe-hrms:custom}
    profiles: ["frappe-hrm"]
    command:
      - bench
      - worker
      - --queue
      - long,default,short
    environment:
      FRAPPE_REDIS_CACHE: redis://frappe-hrms-redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://frappe-hrms-redis-queue:6379
    volumes:
      - frappe-hrms-sites:/home/frappe/frappe-bench/sites
      - frappe-hrms-logs:/home/frappe/frappe-bench/logs
    restart: unless-stopped
    networks:
      - frappe-hrms-net

  frappe-hrms-queue-short:
    container_name: tuyendung-studio-frappe-hrms-queue-short
    image: ${FRAPPE_HR_IMAGE:-square/frappe-hrms:custom}
    profiles: ["frappe-hrm"]
    command:
      - bench
      - worker
      - --queue
      - short,default
    environment:
      FRAPPE_REDIS_CACHE: redis://frappe-hrms-redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://frappe-hrms-redis-queue:6379
    volumes:
      - frappe-hrms-sites:/home/frappe/frappe-bench/sites
      - frappe-hrms-logs:/home/frappe/frappe-bench/logs
    restart: unless-stopped
    networks:
      - frappe-hrms-net

  frappe-hrms-redis-cache:
    container_name: tuyendung-studio-frappe-hrms-redis-cache
    image: redis:6.2-alpine
    profiles: ["frappe-hrm"]
    restart: unless-stopped
    networks:
      - frappe-hrms-net

  frappe-hrms-redis-queue:
    container_name: tuyendung-studio-frappe-hrms-redis-queue
    image: redis:6.2-alpine
    profiles: ["frappe-hrm"]
    volumes:
      - frappe-hrms-redis-queue-data:/data
    restart: unless-stopped
    networks:
      - frappe-hrms-net

  frappe-hrms-scheduler:
    container_name: tuyendung-studio-frappe-hrms-scheduler
    image: ${FRAPPE_HR_IMAGE:-square/frappe-hrms:custom}
    profiles: ["frappe-hrm"]
    command:
      - bench
      - schedule
    volumes:
      - frappe-hrms-sites:/home/frappe/frappe-bench/sites
      - frappe-hrms-logs:/home/frappe/frappe-bench/logs
    restart: unless-stopped
    networks:
      - frappe-hrms-net

  frappe-hrms-websocket:
    container_name: tuyendung-studio-frappe-hrms-websocket
    image: ${FRAPPE_HR_IMAGE:-square/frappe-hrms:custom}
    profiles: ["frappe-hrm"]
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    environment:
      FRAPPE_REDIS_CACHE: redis://frappe-hrms-redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://frappe-hrms-redis-queue:6379
    volumes:
      - frappe-hrms-sites:/home/frappe/frappe-bench/sites
      - frappe-hrms-logs:/home/frappe/frappe-bench/logs
    restart: unless-stopped
    networks:
      - frappe-hrms-net

  # ---------------------------------------------------------------------------
  # LiveKit Server
  # ---------------------------------------------------------------------------
  livekit:
    container_name: tuyendung-studio-livekit
    image: livekit/livekit-server:latest
    entrypoint: ["/bin/sh", "/usr/local/bin/render-livekit-config.sh"]
    environment:
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:?Set LIVEKIT_API_KEY in .env}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:?Set LIVEKIT_API_SECRET in .env}
    volumes:
      - ./voice-ai/docker-livekit-entrypoint.sh:/usr/local/bin/render-livekit-config.sh:ro
    expose:
      - "7880"
      - "7881"
    ports:
      - "7881:7881/tcp"
      - "7882:7882/udp"
      - "50000-50010:50000-50010/udp"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:7880/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      proxy-net:
        aliases:
          - livekit
      app-net:
        aliases:
          - livekit
      data-net:
        aliases:
          - livekit

  # ---------------------------------------------------------------------------
  # LiveKit Egress (For Recording & S3 Upload)
  # ---------------------------------------------------------------------------
  livekit-egress:
    container_name: tuyendung-studio-livekit-egress
    image: livekit/egress:latest
    restart: always
    cap_add:
      - SYS_ADMIN
    environment:
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:?Set LIVEKIT_API_KEY in .env}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:?Set LIVEKIT_API_SECRET in .env}
    entrypoint: ["/bin/sh", "/usr/local/bin/render-egress-config.sh"]
    volumes:
      - ./voice-ai/docker-egress-entrypoint.sh:/usr/local/bin/render-egress-config.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - proxy-net
      - app-net
      - data-net

  # ---------------------------------------------------------------------------
  # Optional local AI Services (GPU-capable, CPU-safe defaults)
  # ---------------------------------------------------------------------------
  whisper:
    container_name: tuyendung-studio-whisper
    build:
      context: ./voice-ai/inference/whisper
    profiles: ["gpu"]
    init: true
    environment:
      - VOXBOX_HF_REPO_ID=${VOXBOX_HF_REPO_ID:-Systran/faster-whisper-large-v3}
      - VOXBOX_DEVICE=${VOXBOX_DEVICE:-cpu}
      - DATA_DIR=${WHISPER_DATA_DIR:-/data}
    volumes:
      - whisper-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/v1/models > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 60s
    restart: always
    networks:
      - app-net

  vieneu-tts:
    container_name: tuyendung-studio-tts
    build:
      context: ./voice-ai/inference/vieneu-text-to-speech
    profiles: ["gpu"]
    init: true
    env_file:
      - .env
    environment:
      - PORT=${VIENEU_TTS_PORT:-8298}
      - TTS_DEVICE=${TTS_DEVICE:-auto}
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:$${PORT:-8298}/health > /dev/null"]
      interval: 10s
      timeout: 10s
      retries: 120
      start_period: 20m
    restart: always
    networks:
      - app-net

  livekit-agent:
    container_name: tuyendung-studio-livekit-agent
    build:
      context: ./voice-ai/livekit_agent
    env_file:
      - .env
    environment:
      - BACKEND_API_URL=${BACKEND_API_URL:-http://backend:8000/api}
      - INTERVIEW_AGENT_SHARED_SECRET=${INTERVIEW_AGENT_SHARED_SECRET:?Set INTERVIEW_AGENT_SHARED_SECRET in .env and share it with backend}
      - LIVEKIT_URL=${LIVEKIT_URL:-http://tuyendung-studio-livekit:7880}
      - LIVEKIT_AGENT_NAME=square-ai-interviewer
      - STT_LANGUAGE=${STT_LANGUAGE:-vi}
      - TTS_VOICE=${TTS_VOICE:-Bình (nam miền Bắc)}

    depends_on:
      backend:
        condition: service_started
      livekit:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    networks:
      - app-net
      - data-net

  # ---------------------------------------------------------------------------
  # MinIO (Object Storage)
  # ---------------------------------------------------------------------------
  minio:
    container_name: tuyendung-studio-minio
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --address ":9000" --console-address "${MINIO_CONSOLE_ADDRESS:-:9001}"
    env_file:
      - .env
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      proxy-net:
        aliases:
          - minio
          - minio-s3
          - s3.tuyendung.square.vn
      app-net:
        aliases:
          - minio
          - minio-s3

  # ---------------------------------------------------------------------------
  # MinIO Init (set bucket policy — runs once per deploy)
  # ---------------------------------------------------------------------------
  minio-init:
    container_name: tuyendung-studio-minio-init
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${MINIO_BUCKET:-square};
      mc anonymous set download local/$${MINIO_BUCKET:-square};
      echo 'MinIO bucket policy set to public download';
      "
    env_file:
      - .env
    restart: "no"
    networks:
      - app-net

  # ---------------------------------------------------------------------------
  # Elasticsearch
  # ---------------------------------------------------------------------------
  elasticsearch:
    container_name: tuyendung-studio-elasticsearch
    image: public.ecr.aws/bitnami/elasticsearch:7.17.18
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        limits:
          memory: 1G
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    restart: always
    networks:
      - app-net
      - data-net

# =============================================================================
# Networks & Volumes
# =============================================================================
networks:
  proxy-net:
    driver: bridge
  app-net:
    driver: bridge
  data-net:
    driver: bridge
  frappe-hrms-net:
    driver: bridge

volumes:
  db_data:
  huggingface-cache:
  whisper-data:
  minio-data:
  elasticsearch-data:
  frappe-hrms-db-data:
  frappe-hrms-redis-queue-data:
  frappe-hrms-sites:
  frappe-hrms-logs:
