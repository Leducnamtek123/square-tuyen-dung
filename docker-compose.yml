# =============================================================================
# docker-compose.yml — CONSOLIDATED CONFIGURATION
# =============================================================================
# This file is the single source of truth for all services.
# It is designed to be production-ready by default.
# Use .env for environment-specific settings.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Nginx Gateway
  # ---------------------------------------------------------------------------
  nginx-gateway:
    container_name: tuyendung-studio-nginx-gateway
    build:
      context: ./nginx-gateway
    ports:
      - "${NGINX_PORT:-8080}:80"
    depends_on:
      - frontend
      - backend
      - livekit
      - minio
    restart: always
    networks:
      - proxy-net

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------
  frontend:
    container_name: tuyendung-studio-frontend
    build:
      context: ./frontend
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile.prod}
      args:
        VITE_NODE_ENV: ${VITE_NODE_ENV:-production}
        VITE_PROJECT_HOST_NAME: ${VITE_PROJECT_HOST_NAME:-tuyendung.square.vn}
        VITE_ADMIN_PROJECT_HOST_NAME: ${VITE_ADMIN_PROJECT_HOST_NAME:-admin.tuyendung.square.vn}
        VITE_EMPLOYER_PROJECT_HOST_NAME: ${VITE_EMPLOYER_PROJECT_HOST_NAME:-employer.tuyendung.square.vn}
        VITE_PROJECT_SERVER_CLIENT_ID: ${VITE_PROJECT_SERVER_CLIENT_ID}
        VITE_PROJECT_SERVER_CLIENT_SECRET: ${VITE_PROJECT_SERVER_CLIENT_SECRET}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_GOOGLE_CLIENT_SECRET: ${VITE_GOOGLE_CLIENT_SECRET}
        VITE_FACEBOOK_CLIENT_ID: ${VITE_FACEBOOK_CLIENT_ID:-}
        VITE_FACEBOOK_CLIENT_SECRET: ${VITE_FACEBOOK_CLIENT_SECRET:-}
        VITE_GOONGAPI_KEY: ${VITE_GOONGAPI_KEY}
        VITE_GOONGAPI_ACCESS_TOKEN: ${VITE_GOONGAPI_ACCESS_TOKEN:-}
        VITE_LIVEKIT_URL: ${VITE_LIVEKIT_URL:-wss://tuyendung.square.vn/livekit}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_DATABASE_URL: ${VITE_FIREBASE_DATABASE_URL}
        VITE_FIREBASE_FORCE_LONG_POLLING: ${VITE_FIREBASE_FORCE_LONG_POLLING}
    env_file:
      - .env
    expose:
      - "80"
    restart: always
    networks:
      - proxy-net

  # ---------------------------------------------------------------------------
  # Backend (Django)
  # ---------------------------------------------------------------------------
  backend:
    container_name: tuyendung-studio-backend
    build:
      context: ./api
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile.prod}
    command: ${BACKEND_COMMAND:-sh docker-entrypoint.sh gunicorn --bind 0.0.0.0:8000 --workers 3 config.wsgi:application}
    env_file:
      - .env
    expose:
      - "8000"
    restart: always
    environment:
      - DEBUG=${DEBUG:-False}
      - AUTO_MIGRATE=${AUTO_MIGRATE:-0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proxy-net
      - app-net
      - data-net

  # ---------------------------------------------------------------------------
  # Migration (run once per deploy)
  # ---------------------------------------------------------------------------
  migrate:
    container_name: tuyendung-studio-migrate
    build:
      context: ./api
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile.prod}
    command: sh docker-entrypoint.sh true
    env_file:
      - .env
    environment:
      - DEBUG=${DEBUG:-False}
      - AUTO_MIGRATE=${AUTO_MIGRATE:-1}
    depends_on:
      - db
    networks:
      - app-net
      - data-net

  # ---------------------------------------------------------------------------
  # Celery Worker
  # ---------------------------------------------------------------------------
  celery-worker:
    container_name: tuyendung-studio-celery-worker
    build:
      context: ./api
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile.prod}
    command: celery -A config worker -l info --concurrency=4
    env_file:
      - .env
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net
      - data-net

  # ---------------------------------------------------------------------------
  # Celery Beat
  # ---------------------------------------------------------------------------
  celery-beat:
    container_name: tuyendung-studio-celery-beat
    build:
      context: ./api
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile.prod}
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net
      - data-net

  # ---------------------------------------------------------------------------
  # MySQL Database
  # ---------------------------------------------------------------------------
  db:
    container_name: tuyendung-studio-db
    image: public.ecr.aws/docker/library/mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_NAME:-square_db}
    volumes:
      - db_data:/var/lib/mysql
      - ./tuyendungsqstudio.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always
    networks:
      - data-net

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    container_name: tuyendung-studio-redis
    image: public.ecr.aws/docker/library/redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - data-net

  # ---------------------------------------------------------------------------
  # LiveKit Server
  # ---------------------------------------------------------------------------
  livekit:
    container_name: tuyendung-studio-livekit
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    env_file:
      - .env
    volumes:
      - ./voice-ai/livekit.yaml:/etc/livekit.yaml
    expose:
      - "7880"
      - "7881"
    ports:
      - "7881:7881/tcp"
      - "7882:7882/udp"
      - "50000-50010:50000-50010/udp"
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - proxy-net
      - data-net

  # ---------------------------------------------------------------------------
  # AI Services (GPU enabled by default)
  # ---------------------------------------------------------------------------
  llama-cpp:
    container_name: tuyendung-studio-llama-cpp
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command:
      - --host
      - ${LLAMA_HOST:-0.0.0.0}
      - --port
      - "${LLAMA_PORT:-11434}"
      - --hf-repo
      - "${LLAMA_HF_REPO:-bartowski/Qwen2.5-14B-Instruct-GGUF}"
      - --hf-file
      - "${LLAMA_HF_FILE:-Qwen2.5-14B-Instruct-Q4_K_M.gguf}"
      - --alias
      - "${LLAMA_MODEL_ALIAS:-qwen2.5-14b}"
      - --ctx-size
      - "${LLAMA_CTX_SIZE:-16384}"
      - --n-gpu-layers
      - "${LLAMA_N_GPU_LAYERS:-100}"
    volumes:
      - llama-models:/root/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:11434/v1/models > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: always
    networks:
      - app-net

  whisper:
    container_name: tuyendung-studio-whisper
    build:
      context: ./voice-ai/inference/whisper
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - VOXBOX_HF_REPO_ID=${VOXBOX_HF_REPO_ID:-Systran/faster-whisper-large-v3}
      - VOXBOX_DEVICE=${VOXBOX_DEVICE:-cuda:0}
      - DATA_DIR=${WHISPER_DATA_DIR:-/data}
    volumes:
      - whisper-data:/data
    restart: always
    networks:
      - app-net

  vieneu-tts:
    container_name: tuyendung-studio-tts
    build:
      context: ./voice-ai/inference/vieneu-text-to-speech
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    env_file:
      - .env
    environment:
      - PORT=${VIENEU_TTS_PORT:-8298}
      - TTS_DEVICE=${TTS_DEVICE:-cuda}
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    restart: always
    networks:
      - app-net

  livekit-agent:
    container_name: tuyendung-studio-livekit-agent
    build:
      context: ./voice-ai/livekit_agent
    env_file:
      - .env
    environment:
      - BACKEND_API_URL=${BACKEND_API_URL:-http://backend:8000/api}
      - LIVEKIT_URL=${LIVEKIT_URL:-http://livekit:7880}
    depends_on:
      - backend
      - livekit
      - vieneu-tts
      - whisper
      - llama-cpp
    restart: always
    networks:
      - app-net
      - data-net

  # ---------------------------------------------------------------------------
  # MinIO (Object Storage)
  # ---------------------------------------------------------------------------
  minio:
    container_name: tuyendung-studio-minio
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address "${MINIO_CONSOLE_ADDRESS:-:9001}"
    env_file:
      - .env
    volumes:
      - minio-data:/data
    restart: always
    networks:
      - proxy-net
      - app-net

  # ---------------------------------------------------------------------------
  # Elasticsearch
  # ---------------------------------------------------------------------------
  elasticsearch:
    container_name: tuyendung-studio-elasticsearch
    image: public.ecr.aws/bitnami/elasticsearch:7.17.18
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    restart: always
    networks:
      - app-net
      - data-net

# =============================================================================
# Networks & Volumes
# =============================================================================
networks:
  proxy-net:
    driver: bridge
  app-net:
    driver: bridge
  data-net:
    driver: bridge

volumes:
  db_data:
  huggingface-cache:
  whisper-data:
  minio-data:
  elasticsearch-data:
  llama-models:
