version: '3'

services:
  db:
    image: mysql:8.0
    container_name: project-db-container
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
    volumes:
      - ./data/project_db.sql:/docker-entrypoint-initdb.d/data.sql
      - project-volume:/var/lib/mysql
    networks:
      - project-network
    ports:
      - "${DB_PORT}:${DB_PORT}"
    healthcheck:
      test: >
        mysqladmin ping -h localhost -u root -p${DB_PASSWORD} &&
        mysql -u root -p${DB_PASSWORD} -e 'SELECT 1 FROM information_schema.schemata WHERE schema_name = "${DB_NAME}"'
      interval: 20s
      timeout: 30s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
  redis:
    image: redis:alpine
    container_name: project-redis
    restart: always
    command: redis-server --requirepass ${SERVICE_REDIS_PASSWORD} --port ${SERVICE_REDIS_PORT}
    networks:
      - project-network
    ports:
      - "${SERVICE_REDIS_PORT}:${SERVICE_REDIS_PORT}"
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "-p", "${SERVICE_REDIS_PORT}", "-a", "${SERVICE_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
  backend:
    image: project-backend
    container_name: project-backend-container
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - project-network
    volumes:
      - ./:/api
    depends_on:
      db:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://backend:8000/api/common/health/"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
  celery-worker:
    image: project-backend
    container_name: project-celery-worker
    restart: always
    command: bash -c "celery -A config.celery worker --loglevel=info --concurrency=4 --max-memory-per-child=512000 & celery -A config.celery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler & wait"
    env_file:
      - .env
    networks:
      - project-network
    volumes:
      - ./:/api
    depends_on:
      db:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
      backend:
        condition: service_healthy
        required: true
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 512M

  # Ngrok to public API
  # Domain: ngrok-url (ngrok-url.com)
  ngrok:
    image: ngrok/ngrok:latest
    container_name: project-ngrok-container
    restart: always
    command: start --all --config /etc/ngrok/ngrok.yml
    volumes:
      - ./ngrok.yml:/etc/ngrok/ngrok.yml
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    networks:
      - project-network
    depends_on:
      backend:
        condition: service_healthy
        required: true

networks:
  project-network:
    name: project-network

volumes:
  project-volume:
