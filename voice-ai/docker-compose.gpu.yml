services:
  vieneu-tts:
    build:
      context: ./inference/vieneu-tts
      args:
        MIRROR_PREFIX: ${DOCKER_MIRROR:-nvidia}
    gpus: all

  llama_cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    gpus: all
    environment:
      - LLAMA_ARG_N_GPU_LAYERS=${LLAMA_N_GPU_LAYERS:-35}

  whisper:
    build:
      context: ./inference/whisper
      args:
        WHISPER_BASE: ${WHISPER_BASE:-${DOCKER_MIRROR:-nvidia}/cuda:12.4.1-cudnn-runtime-ubuntu22.04}
        MIRROR_PREFIX: ${DOCKER_MIRROR:-nvidia}
    gpus: all
    environment:
      - VOXBOX_DEVICE=${VOXBOX_DEVICE:-cuda:0}
