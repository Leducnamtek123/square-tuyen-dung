services:
  nginx-gateway:
    container_name: tuyendung-studio-nginx-gateway
    build:
      context: ./nginx-gateway
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend
      - livekit
      - minio
    restart: always
    networks:
      - square-network

  frontend:
    container_name: tuyendung-studio-frontend-prod
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_NODE_ENV: production
        REACT_APP_NODE_ENV: production
        REACT_APP_API_JOB: /api/job/web
        REACT_APP_API_COMPANY: /api/company/web
        REACT_APP_API_INFO: /api/info/web
        REACT_APP_API_AUTH: /api/auth/web
        VITE_MYJOB_SERVER_CLIENT_ID: ${VITE_MYJOB_SERVER_CLIENT_ID:-qDZFCwY3yuN5mVNHqVVz8cAcREy5iQuGOTtQthjS}
        VITE_MYJOB_SERVER_CLIENT_SECRECT: ${VITE_MYJOB_SERVER_CLIENT_SECRECT:-myjob_secret_client_key_2024}
        VITE_MYJOB_HOST_NAME: ${VITE_MYJOB_HOST_NAME:-tuyendung.square.vn}
        VITE_ADMIN_MYJOB_HOST_NAME: ${VITE_ADMIN_MYJOB_HOST_NAME:-admin.tuyendung.square.vn}
        VITE_EMPLOYER_MYJOB_HOST_NAME: ${VITE_EMPLOYER_MYJOB_HOST_NAME:-employer.tuyendung.square.vn}
        VITE_GOONGAPI_KEY: ${VITE_GOONGAPI_KEY:-0Dn3IFPq2ZWDmCMBFVbUXsT6yqLaqYa5lXRUyFO0}
        VITE_GOONGAPI_ACCESS_TOKEN: ${VITE_GOONGAPI_ACCESS_TOKEN:-}
        VITE_LIVEKIT_URL: wss://tuyendung.square.vn/livekit
    env_file:
      - .env.prod
    expose:
      - "80"
    restart: always
    networks:
      - square-network

  backend:
    container_name: tuyendung-studio-backend-prod
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    command: gunicorn --bind 0.0.0.0:8000 --workers 3 myjob_api.wsgi:application
    expose:
      - "8000"
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - .env.prod
    environment:
      - LIVEKIT_URL=http://livekit:7880
      - LIVEKIT_AGENT_NAME=square-ai-interviewer
    networks:
      - square-network

  db:
    image: mysql:8.0
    container_name: tuyendung-studio-db-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: square_db
    volumes:
      - db_data_prod:/var/lib/mysql
      - ./tuyendungsqstudio.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - square-network

  redis:
    image: redis:7
    container_name: tuyendung-studio-redis-prod
    restart: always
    networks:
      - square-network

  celery-worker:
    container_name: tuyendung-studio-celery-worker-prod
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    command: celery -A myjob_api.celery worker --pool=prefork --loglevel=info
    depends_on:
      - db
      - redis
    restart: always
    env_file:
      - .env.prod
    networks:
      - square-network

  celery-beat:
    container_name: tuyendung-studio-celery-beat-prod
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    command: celery -A myjob_api beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - db
      - redis
    restart: always
    env_file:
      - .env.prod
    networks:
      - square-network

  livekit:
    image: livekit/livekit-server:latest
    container_name: tuyendung-studio-livekit-prod
    command: --config /etc/livekit.yaml
    volumes:
      - ./voice-ai/livekit.yaml:/etc/livekit.yaml
    expose:
      - "7880"
      - "7881"
    ports:
      - "7881:7881/tcp"
      - "7882:7882/udp"
      - "50000-50010:50000-50010/udp"
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-secret}"
    env_file:
      - .env.prod
    restart: always
    networks:
      - square-network

  minio:
    image: minio/minio:latest
    container_name: tuyendung-studio-minio-prod
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-password}
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio-data:/data
    env_file:
      - .env.prod
    restart: always
    networks:
      - square-network

  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: tuyendung-studio-llama-cpp
    command:
      - --host
      - 0.0.0.0
      - --port
      - "11434"
      - --model
      - /models/llama.cpp/Qwen2.5-7B-Instruct-Q4_K_M.gguf
      - --alias
      - "${LLAMA_MODEL_ALIAS:-qwen2-7b}"
      - --ctx-size
      - "${LLAMA_CTX_SIZE:-16384}"
    ports:
      - "11436:11434"
    volumes:
      - ./voice-ai/inference/llama/models:/models
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:11434/v1/models > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: always
    networks:
      - square-network

  whisper:
    build:
      context: ./voice-ai/inference/whisper
    container_name: tuyendung-studio-whisper-prod
    gpus: all
    volumes:
      - whisper-data:/data
    environment:
      - VOXBOX_HF_REPO_ID=${VOXBOX_HF_REPO_ID:-Systran/faster-whisper-medium}
      - VOXBOX_DEVICE=${VOXBOX_DEVICE:-cpu}
      - DATA_DIR=/data
    expose:
      - "8080"
    restart: always
    networks:
      - square-network

  vieneu-tts:
    build:
      context: ./voice-ai/inference/vieneu-text-to-speech
    container_name: tuyendung-studio-tts-prod
    gpus: all
    env_file:
      - .env.prod
    environment:
      - PORT=8298
    expose:
      - "8298"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    restart: always
    networks:
      - square-network

  livekit-agent:
    build:
      context: ./voice-ai/livekit_agent
    container_name: tuyendung-studio-livekit-agent-prod
    volumes:
      - ./voice-ai/livekit_agent/src:/app/src
    environment:
      - NUM_IDLE_PROCESSES=${NUM_IDLE_PROCESSES:-1}
      - BACKEND_API_URL=http://backend:8000/api
      - AUTO_END_ON_COMPLETION=${AUTO_END_ON_COMPLETION:-0}
      - LIVEKIT_URL=http://livekit:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
      - TTS_VOICE=${TTS_VOICE:-Binh (nam mien Bac)}
      - LLAMA_BASE_URL=http://llama-cpp:11434/v1
      - STT_BASE_URL=http://whisper:8080/v1
      - TTS_BASE_URL=http://vieneu-tts:8298/v1
    depends_on:
      - backend
      - livekit
      - llama-cpp
      - whisper
      - vieneu-tts
    restart: always
    networks:
      - square-network

networks:
  square-network:
    driver: bridge

volumes:
  db_data_prod:
  huggingface-cache:
  whisper-data:
  minio-data:
