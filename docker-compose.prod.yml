services:
  nginx-gateway:
    container_name: tuyendung-studio-nginx-gateway
    build:
      context: ./nginx-gateway
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend
      - livekit
    restart: always
    networks:
      - square-network

  frontend:
    container_name: tuyendung-studio-frontend-prod
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_NODE_ENV: production
        REACT_APP_NODE_ENV: production
        REACT_APP_API_JOB: /api/job/web
        REACT_APP_API_COMPANY: /api/company/web
        REACT_APP_API_INFO: /api/info/web
        REACT_APP_API_AUTH: /api/auth/web
        VITE_MYJOB_SERVER_CLIENT_ID: ${VITE_MYJOB_SERVER_CLIENT_ID}
        VITE_MYJOB_SERVER_CLIENT_SECRECT: ${VITE_MYJOB_SERVER_CLIENT_SECRECT}
        VITE_MYJOB_HOST_NAME: ${VITE_MYJOB_HOST_NAME}
        VITE_ADMIN_MYJOB_HOST_NAME: ${VITE_ADMIN_MYJOB_HOST_NAME}
        VITE_EMPLOYER_MYJOB_HOST_NAME: ${VITE_EMPLOYER_MYJOB_HOST_NAME}
        VITE_GOONGAPI_KEY: ${VITE_GOONGAPI_KEY}
        VITE_GOONGAPI_ACCESS_TOKEN: ${VITE_GOONGAPI_ACCESS_TOKEN}
    expose:
      - "80"
    restart: always
    networks:
      - square-network

  backend:
    container_name: tuyendung-studio-backend-prod
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    command: gunicorn --bind 0.0.0.0:8000 --workers 3 myjob_api.wsgi:application
    expose:
      - "8000"
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - .env.prod
    networks:
      - square-network

  db:
    image: mysql:8.0
    container_name: tuyendung-studio-db-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: square_db
    volumes:
      - db_data_prod:/var/lib/mysql
      - ./tuyendungsqstudio.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - square-network

  redis:
    image: redis:7
    container_name: tuyendung-studio-redis-prod
    restart: always
    networks:
      - square-network

  celery-worker:
    container_name: tuyendung-studio-celery-worker-prod
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    command: celery -A myjob_api.celery worker --pool=prefork --loglevel=info
    depends_on:
      - db
      - redis
    restart: always
    env_file:
      - .env.prod
    networks:
      - square-network

  celery-beat:
    container_name: tuyendung-studio-celery-beat-prod
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    command: celery -A myjob_api beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - db
      - redis
    restart: always
    env_file:
      - .env.prod
    networks:
      - square-network

  livekit:
    image: livekit/livekit-server:latest
    container_name: tuyendung-studio-livekit-prod
    command: --config /etc/livekit.yaml
    volumes:
      - ./voice-ai/livekit.yaml:/etc/livekit.yaml
    expose:
      - "7880"
      - "7881"
    ports:
      - "7882:7882/udp"
      - "50000-50010:50000-50010/udp"
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-secret}"
    restart: always
    networks:
      - square-network

  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: tuyendung-studio-llama-cpp
    command:
      - --host
      - 0.0.0.0
      - --port
      - "11434"
      - --model
      - /models/llama.cpp/Qwen2.5-7B-Instruct-Q4_K_M.gguf
      - --alias
      - "${LLAMA_MODEL_ALIAS:-qwen2-7b}"
      - --ctx-size
      - "${LLAMA_CTX_SIZE:-16384}"
    ports:
      - "11436:11434"
    volumes:
      - ./voice-ai/inference/llama/models:/models
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:11434/v1/models > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: always
    networks:
      - square-network

networks:
  square-network:
    driver: bridge

volumes:
  db_data_prod:
  huggingface-cache:
  whisper-data:
  minio-data:
