# =============================================================================
# docker-compose.prod.yml — PRODUCTION overrides
# =============================================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Only contains production-specific differences from the base.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Nginx Gateway (prod only)
  # ---------------------------------------------------------------------------
  nginx-gateway:
    container_name: tuyendung-studio-nginx-gateway
    build:
      context: ./nginx-gateway
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend
      - livekit
      - minio
    restart: always
    networks:
      - proxy-net

  # ---------------------------------------------------------------------------
  # Frontend — prod build with Nginx
  # ---------------------------------------------------------------------------
  frontend:
    container_name: tuyendung-studio-frontend-prod
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_NODE_ENV: ${VITE_NODE_ENV:-production}
        VITE_PROJECT_HOST_NAME: ${VITE_PROJECT_HOST_NAME}
        VITE_ADMIN_PROJECT_HOST_NAME: ${VITE_ADMIN_PROJECT_HOST_NAME}
        VITE_EMPLOYER_PROJECT_HOST_NAME: ${VITE_EMPLOYER_PROJECT_HOST_NAME}
        VITE_PROJECT_SERVER_CLIENT_ID: ${VITE_PROJECT_SERVER_CLIENT_ID}
        VITE_PROJECT_SERVER_CLIENT_SECRET: ${VITE_PROJECT_SERVER_CLIENT_SECRET}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_GOOGLE_CLIENT_SECRET: ${VITE_GOOGLE_CLIENT_SECRET}
        VITE_FACEBOOK_CLIENT_ID: ${VITE_FACEBOOK_CLIENT_ID:-}
        VITE_FACEBOOK_CLIENT_SECRET: ${VITE_FACEBOOK_CLIENT_SECRET:-}
        VITE_GOONGAPI_KEY: ${VITE_GOONGAPI_KEY}
        VITE_GOONGAPI_ACCESS_TOKEN: ${VITE_GOONGAPI_ACCESS_TOKEN:-}
        VITE_LIVEKIT_URL: ${VITE_LIVEKIT_URL}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_DATABASE_URL: ${VITE_FIREBASE_DATABASE_URL}
        VITE_FIREBASE_FORCE_LONG_POLLING: ${VITE_FIREBASE_FORCE_LONG_POLLING}
    env_file:
      - .env.prod
    expose:
      - "80"
    restart: always
    networks:
      - proxy-net

  # ---------------------------------------------------------------------------
  # Backend — Gunicorn
  # ---------------------------------------------------------------------------
  backend:
    container_name: tuyendung-studio-backend-prod
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    command: sh docker-entrypoint.sh gunicorn --bind ${GUNICORN_BIND:-0.0.0.0:8000} --workers ${GUNICORN_WORKERS:-3} ${GUNICORN_APP:-config.wsgi:application}
    env_file:
      - .env.prod
    expose:
      - "8000"
    restart: always
    environment:
      - DEBUG=${DEBUG:-False}
      - AUTO_MIGRATE=${AUTO_MIGRATE:-0}
    networks:
      - proxy-net
      - app-net
      - data-net

  # ---------------------------------------------------------------------------
  # Migration (run once per deploy)
  # ---------------------------------------------------------------------------
  migrate:
    container_name: tuyendung-studio-migrate-prod
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    command: sh docker-entrypoint.sh true
    env_file:
      - .env.prod
    environment:
      - DEBUG=${DEBUG:-False}
      - AUTO_MIGRATE=${AUTO_MIGRATE:-1}
    depends_on:
      - db
    networks:
      - app-net
      - data-net

  # ---------------------------------------------------------------------------
  # Celery (prod)
  # ---------------------------------------------------------------------------
  celery-worker:
    container_name: tuyendung-studio-celery-worker-prod
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    env_file:
      - .env.prod
    restart: always
    networks:
      - app-net
      - data-net

  celery-beat:
    container_name: tuyendung-studio-celery-beat-prod
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    env_file:
      - .env.prod
    restart: always
    networks:
      - app-net
      - data-net

  # ---------------------------------------------------------------------------
  # DB / Redis — no ports exposed externally in prod
  # ---------------------------------------------------------------------------
  db:
    container_name: tuyendung-studio-db-prod
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_NAME:-square_db}
    restart: always
    volumes:
      - db_data_prod:/var/lib/mysql
    networks:
      - data-net

  redis:
    container_name: tuyendung-studio-redis-prod
    image: redis:7
    restart: always
    networks:
      - data-net

  # ---------------------------------------------------------------------------
  # LiveKit — prod mode
  # ---------------------------------------------------------------------------
  livekit:
    container_name: tuyendung-studio-livekit-prod
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    env_file:
      - .env.prod
    volumes:
      - ./voice-ai/livekit.yaml:/etc/livekit.yaml
    expose:
      - "7880"
      - "7881"
    ports:
      - "7881:7881/tcp"
      - "7882:7882/udp"
      - "50000-50010:50000-50010/udp"
    restart: always
    networks:
      - proxy-net
      - data-net

  # ---------------------------------------------------------------------------
  # AI Engineering (GPU for prod)
  # ---------------------------------------------------------------------------
  llama-cpp:
    container_name: tuyendung-studio-llama-cpp-prod
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command:
      - --host
      - ${LLAMA_HOST:-0.0.0.0}
      - --port
      - "${LLAMA_PORT:-11434}"
      - --hf-repo
      - "${LLAMA_HF_REPO:-bartowski/Qwen2.5-14B-Instruct-GGUF}"
      - --hf-file
      - "${LLAMA_HF_FILE:-Qwen2.5-14B-Instruct-Q4_K_M.gguf}"
      - --alias
      - "${LLAMA_MODEL_ALIAS:-qwen2.5-14b}"
      - --ctx-size
      - "${LLAMA_CTX_SIZE:-16384}"
      - --n-gpu-layers
      - "${LLAMA_N_GPU_LAYERS:-100}"
    volumes:
      - llama-models:/root/.cache
    ports:
      - "11436:11434"
    restart: always
    networks:
      - app-net

  whisper:
    container_name: tuyendung-studio-whisper-prod
    build:
      context: ./voice-ai/inference/whisper
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - VOXBOX_DEVICE=${VOXBOX_DEVICE:-cuda:0}
    expose:
      - "8080"
    restart: always
    networks:
      - app-net

  vieneu-tts:
    container_name: tuyendung-studio-tts-prod
    build:
      context: ./voice-ai/inference/vieneu-text-to-speech
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    env_file:
      - .env.prod
    environment:
      - TTS_DEVICE=${TTS_DEVICE:-cuda}
    expose:
      - "8298"
    restart: always
    networks:
      - app-net

  livekit-agent:
    container_name: tuyendung-studio-livekit-agent-prod
    build:
      context: ./voice-ai/livekit_agent
    env_file:
      - .env.prod
    environment:
      - BACKEND_API_URL=${BACKEND_API_URL:-http://backend:8000/api}
      - LIVEKIT_URL=${LIVEKIT_URL:-http://livekit:7880}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
      - LLAMA_BASE_URL=${LLAMA_BASE_URL:-http://llama-cpp:11434/v1}
      - STT_BASE_URL=${STT_BASE_URL:-http://whisper:8080/v1}
      - TTS_BASE_URL=${TTS_BASE_URL:-http://vieneu-tts:8298/v1}
    depends_on:
      - livekit
      - vieneu-tts
      - whisper
      - llama-cpp
    restart: always
    networks:
      - app-net
      - data-net

  # ---------------------------------------------------------------------------
  # MinIO — prod
  # ---------------------------------------------------------------------------
  minio:
    container_name: tuyendung-studio-minio-prod
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address "${MINIO_CONSOLE_ADDRESS:-:9001}"
    env_file:
      - .env.prod
    environment:
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-https://tuyendung.square.vn/minio-console/}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-http://minio:9000}
    expose:
      - "9000"
      - "9001"
    restart: always
    networks:
      - proxy-net
      - app-net

# =============================================================================
# Production Infrastructure (Isolated Networks)
# =============================================================================
networks:
  proxy-net:
    driver: bridge
  app-net:
    driver: bridge
  data-net:
    driver: bridge

volumes:
  db_data_prod:
  llama-models:
