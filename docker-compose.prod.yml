# =============================================================================
# docker-compose.prod.yml — PRODUCTION overrides
# =============================================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Only contains production-specific differences from the base.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Nginx Gateway (prod only)
  # ---------------------------------------------------------------------------
  nginx-gateway:
    container_name: tuyendung-studio-nginx-gateway
    build:
      context: ./nginx-gateway
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend
      - livekit
      - minio
    restart: always
    networks:
      - square-network

  # ---------------------------------------------------------------------------
  # Frontend — prod build with Nginx
  # ---------------------------------------------------------------------------
  frontend:
    container_name: tuyendung-studio-frontend-prod
    build:
      dockerfile: Dockerfile.prod
      args:
        VITE_NODE_ENV: production
        VITE_PROJECT_HOST_NAME: ${VITE_PROJECT_HOST_NAME}
        VITE_ADMIN_PROJECT_HOST_NAME: ${VITE_ADMIN_PROJECT_HOST_NAME}
        VITE_EMPLOYER_PROJECT_HOST_NAME: ${VITE_EMPLOYER_PROJECT_HOST_NAME}
        VITE_PROJECT_SERVER_CLIENT_ID: ${VITE_PROJECT_SERVER_CLIENT_ID}
        VITE_PROJECT_SERVER_CLIENT_SECRECT: ${VITE_PROJECT_SERVER_CLIENT_SECRECT}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_GOOGLE_CLIENT_SECRET: ${VITE_GOOGLE_CLIENT_SECRET}
        VITE_FACEBOOK_CLIENT_ID: ${VITE_FACEBOOK_CLIENT_ID:-}
        VITE_FACEBOOK_CLIENT_SECRET: ${VITE_FACEBOOK_CLIENT_SECRET:-}
        VITE_GOONGAPI_KEY: ${VITE_GOONGAPI_KEY}
        VITE_GOONGAPI_ACCESS_TOKEN: ${VITE_GOONGAPI_ACCESS_TOKEN:-}
        VITE_LIVEKIT_URL: ${VITE_LIVEKIT_URL}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_DATABASE_URL: ${VITE_FIREBASE_DATABASE_URL}
    env_file:
      - .env.prod
    expose:
      - "80"
    restart: always

  # ---------------------------------------------------------------------------
  # Backend — Gunicorn
  # ---------------------------------------------------------------------------
  backend:
    container_name: tuyendung-studio-backend-prod
    build:
      dockerfile: Dockerfile.prod
    command: sh docker-entrypoint.sh gunicorn --bind 0.0.0.0:8000 --workers 3 config.wsgi:application
    env_file:
      - .env.prod
    expose:
      - "8000"
    restart: always
    environment:
      - DEBUG=False

  # ---------------------------------------------------------------------------
  # Celery (prod)
  # ---------------------------------------------------------------------------
  celery-worker:
    container_name: tuyendung-studio-celery-worker-prod
    build:
      dockerfile: Dockerfile.prod
    env_file:
      - .env.prod
    restart: always

  celery-beat:
    container_name: tuyendung-studio-celery-beat-prod
    build:
      dockerfile: Dockerfile.prod
    env_file:
      - .env.prod
    restart: always

  # ---------------------------------------------------------------------------
  # DB / Redis — no ports exposed externally in prod
  # ---------------------------------------------------------------------------
  db:
    container_name: tuyendung-studio-db-prod
    restart: always
    volumes:
      - db_data_prod:/var/lib/mysql

  redis:
    container_name: tuyendung-studio-redis-prod
    restart: always

  # ---------------------------------------------------------------------------
  # LiveKit — prod mode (no --dev flag)
  # ---------------------------------------------------------------------------
  livekit:
    container_name: tuyendung-studio-livekit-prod
    command: --config /etc/livekit.yaml
    env_file:
      - .env.prod
    expose:
      - "7880"
      - "7881"
    ports:
      - "7881:7881/tcp"
      - "7882:7882/udp"
      - "50000-50010:50000-50010/udp"
    restart: always

  # ---------------------------------------------------------------------------
  # LLaMA.cpp — GPU for prod
  # ---------------------------------------------------------------------------
  llama-cpp:
    container_name: tuyendung-studio-llama-cpp-prod
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command:
      - --host
      - 0.0.0.0
      - --port
      - "11434"
      - --model
      - /models/llama.cpp/Qwen2.5-7B-Instruct-Q4_K_M.gguf
      - --alias
      - "qwen2.5-7b"
      - --ctx-size
      - "16384"
      - --n-gpu-layers
      - "100"
    ports:
      - "11436:11434"
    restart: always

  # ---------------------------------------------------------------------------
  # Whisper — prod (GPU)
  # ---------------------------------------------------------------------------
  whisper:
    container_name: tuyendung-studio-whisper-prod
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - VOXBOX_DEVICE=${VOXBOX_DEVICE:-cuda:0}
    expose:
      - "8080"
    restart: always

  # ---------------------------------------------------------------------------
  # TTS — prod (GPU)
  # ---------------------------------------------------------------------------
  vieneu-tts:
    container_name: tuyendung-studio-tts-prod
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    env_file:
      - .env.prod
    environment:
      - TTS_DEVICE=cuda
    expose:
      - "8298"
    restart: always

  # ---------------------------------------------------------------------------
  # LiveKit Agent — prod
  # ---------------------------------------------------------------------------
  livekit-agent:
    container_name: tuyendung-studio-livekit-agent-prod
    environment:
      - BACKEND_API_URL=http://backend:8000/api
    restart: always

  # ---------------------------------------------------------------------------
  # MinIO — prod
  # ---------------------------------------------------------------------------
  minio:
    container_name: tuyendung-studio-minio-prod
    env_file:
      - .env.prod
    environment:
      MINIO_BROWSER_REDIRECT_URL: https://tuyendung.square.vn/minio-console/
      MINIO_SERVER_URL: http://minio:9000
    expose:
      - "9000"
      - "9001"
    restart: always

# Override volumes for prod (separate from dev)
volumes:
  db_data_prod:
