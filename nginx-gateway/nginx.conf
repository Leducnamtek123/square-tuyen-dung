server {
    listen 80;
    server_name tuyendung.square.vn; # Tên miền thực của bạn

    # Tăng kích thước upload nếu cần
    client_max_body_size 100M;

    # Docker DNS resolver to re-resolve service names if containers restart
    resolver 127.0.0.11 valid=30s;

    # 1. Định tuyến API cho Backend (Django)
    location /api/ {
        set $upstream_backend backend;
        proxy_pass http://$upstream_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Hỗ trợ WebSockets cho một số tính năng nếu cần
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 2. Định tuyến cho Frontend (React)
    # Vì dùng Path-based (/admin, /employee) nên tất cả đều trỏ về service frontend
    location / {
        set $upstream_frontend frontend;
        proxy_pass http://$upstream_frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Định tuyến LiveKit
    location /livekit/ {
        # Resolver này là của Docker Internal DNS
        resolver 127.0.0.11 valid=30s;
        set $upstream_livekit livekit;

        # Strip /livekit/ prefix so upstream sees /rtc/...
        rewrite ^/livekit/(.*)$ /$1 break;
        proxy_pass http://$upstream_livekit:7880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 4. Định tuyến MinIO API (Media)
    location /minio/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_minio minio;
        proxy_pass http://$upstream_minio:9000/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 5. Định tuyến MinIO Console (Giao diện quản trị)
    location /minio-console/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_minio minio;
        
        # Cấu hình quan trọng cho subpath
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-NginX-Proxy true;

        # Giúp MinIO hiểu nó đang ở subpath nào
        proxy_set_header X-Forwarded-Prefix /minio-console;

        # Hỗ trợ WebSockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward tới cổng 9001 của MinIO
        rewrite ^/minio-console/(.*)$ /$1 break;
        proxy_pass http://$upstream_minio:9001;
    }
}

# 5. Dedicated Server for MinIO Subdomain
server {
    listen 80;
    server_name s3.tuyendung.square.vn;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $upstream_minio minio;
        proxy_pass http://$upstream_minio:9000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # MinIO specific headers and timeouts
        proxy_connect_timeout 300;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
        client_max_body_size 0;
    }
}
