limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;

server {
    listen 80;
    server_name tuyendung.square.vn;

    client_max_body_size 100M;
    resolver 127.0.0.11 valid=30s;

    # --- Security Headers ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://accounts.google.com https://unpkg.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://s3.tuyendung.square.vn https://res.cloudinary.com https://lh3.googleusercontent.com https://www.google.com https://*.google.com https://*.goong.io https://firebasestorage.googleapis.com https://*.firebasestorage.app https://flagcdn.com https://*.tile.openstreetmap.org https://cdn.jsdelivr.net; connect-src 'self' https://s3.tuyendung.square.vn wss://tuyendung.square.vn https://accounts.google.com https://firebasestorage.googleapis.com https://*.firebasestorage.app https://firestore.googleapis.com https://*.googleapis.com https://*.goong.io; frame-src 'self' https://accounts.google.com https://s3.tuyendung.square.vn https://res.cloudinary.com https://firebasestorage.googleapis.com https://*.firebasestorage.app;" always;

    # --- Static Asset Caching ---
    location /_next/static/ {
        set $upstream_frontend_url http://frontend:80;
        proxy_pass $upstream_frontend_url;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /static/ {
        set $upstream_backend_url http://backend:8000;
        proxy_pass $upstream_backend_url;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # MinIO Console API must stay under /minio-console/* to avoid /api/v1 conflicts.
    location /minio-console/api/v1/ {
        resolver 127.0.0.11 valid=30s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto "";
        proxy_set_header X-Forwarded-Host "";
        proxy_set_header X-Forwarded-Prefix /minio-console/;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        rewrite ^/minio-console/api/v1/(.*)$ /api/v1/$1 break;
        proxy_pass http://minio:9001;
    }

    location ~* ^/api/(v1/)?auth/(token|convert-token|send-verify-email|forgot-password|reset-password)/ {
        limit_req zone=auth_limit burst=30 nodelay;
        set $upstream_backend_url http://backend:8000;
        proxy_pass $upstream_backend_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/ {
        set $upstream_backend_url http://backend:8000;
        proxy_pass $upstream_backend_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        set $upstream_frontend_url http://frontend:80;
        proxy_pass $upstream_frontend_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # LiveKit (accept both /livekit and /livekit/)
    location ^~ /livekit {
        resolver 127.0.0.11 valid=30s;
        set $upstream_livekit_url http://livekit:7880;

        rewrite ^/livekit/?(.*)$ /$1 break;
        proxy_pass $upstream_livekit_url;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /minio/ {
        resolver 127.0.0.11 valid=30s;
        rewrite ^/minio/(.*)$ /$1 break;

        proxy_pass http://minio:9000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding off;
    }

    location /minio-console/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_minio_console http://minio:9001;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-NginX-Proxy true;
        proxy_set_header X-Forwarded-Prefix /minio-console/;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        rewrite ^/minio-console/(.*)$ /$1 break;
        proxy_pass $upstream_minio_console;
    }
}

server {
    listen 80;
    server_name s3.tuyendung.square.vn;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $upstream_minio_api http://minio:9000;
        proxy_pass $upstream_minio_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 300;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
        client_max_body_size 0;
    }
}
