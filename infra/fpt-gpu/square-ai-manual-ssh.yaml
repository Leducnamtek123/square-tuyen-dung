name: square-ai-manual

gpu_instance: "1xH100"

image_setting:
   template_name: "NVIDIA Pytorch 25.03"

access_container:
   tcp_ports:
      - 22
   http_ports:
      - 8000
      - 8080
      - 8298
   ssh_keys:
      - name: "square-ai-fpt-gpu-rsa"
        key: "ssh-rsa  square-ai-fpt-gpu-rsa"

advanced_settings:
   persistent_disk:
      mount_capacity: 200
      mount_path: "/models"

   environment_variables:
      - key: LLM_MODEL
        value: "Qwen/Qwen3-14B"
      - key: LLM_SERVED_MODEL_NAME
        value: "qwen3-14b-interview"
      - key: API_TOKEN
        value: "36173238af56c9ee63badd82ac28ef9bb22ab5a47d8b02e29b8dc8a1f236b85b"
      - key: HF_HOME
        value: "/models/huggingface"
      - key: VLLM_DOWNLOAD_DIR
        value: "/models/huggingface"
      - key: DTYPE
        value: "bfloat16"
      - key: GPU_MEMORY_UTILIZATION
        value: "0.55"
      - key: MAX_MODEL_LEN
        value: "8192"
      - key: MAX_NUM_SEQS
        value: "8"
      - key: REASONING_PARSER
        value: "qwen3"
      - key: VOXBOX_HF_REPO_ID
        value: "Systran/faster-whisper-large-v3"
      - key: VOXBOX_DEVICE
        value: "cuda"
      - key: DATA_DIR
        value: "/models/whisper"
      - key: TTS_DEVICE
        value: "cuda"
      - key: TTS_CODEC_DEVICE
        value: "cuda"
      - key: TTS_MODE
        value: "fast"
      - key: TTS_BACKBONE_REPO
        value: "pnnbao-ump/VieNeu-TTS"
      - key: TTS_GGUF_FILENAME
        value: ""
      - key: TTS_EMOTION
        value: "natural"
      - key: TTS_GPU_MEM_FRACTION
        value: "0.30"
      - key: TTS_INFER_TEMPERATURE
        value: ""
      - key: TTS_INFER_TOP_K
        value: ""
      - key: TTS_MAX_CHARS
        value: ""
      - key: TTS_DEFAULT_SPEED
        value: ""
      - key: TTS_NORMALIZE_AUDIO
        value: ""
      - key: TTS_PEAK_LIMIT
        value: "0.98"
      - key: TTS_PEAK_NORMALIZE_TARGET
        value: ""
      - key: STT_STARTUP_DELAY_SECONDS
        value: "30"
      - key: TTS_STARTUP_DELAY_SECONDS
        value: "60"
      - key: SQUARE_REPO_URL
        value: "https://github.com/Leducnamtek123/square-tuyen-dung.git"
      - key: SQUARE_REPO_REF
        value: "main"

   startup_commands:
      cmd:
      args:
