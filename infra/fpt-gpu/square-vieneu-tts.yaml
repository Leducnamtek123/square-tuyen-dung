# FPT GPU Container import configuration for Square VieNeu TTS.
# Replace registry placeholders before importing into FPT Cloud.
name: square-vieneu-tts
gpu_instance: "1xH100"

image_setting:
  image_url: registry.fke.fptcloud.com/<registry-id>/square-vieneu-tts
  image_tag: latest
  image_user: "<registry-user>"
  image_password: "<registry-token>"

access_container:
  tcp_ports: []
  http_ports:
    - 8298

advanced_settings:
  persistent_disk:
    mount_capacity: 100
    mount_path: /root/.cache/huggingface
  environment_variables:
    - key: PORT
      value: "8298"
    - key: TTS_DEVICE
      value: cuda
    - key: TTS_CODEC_DEVICE
      value: cuda
    - key: TTS_MODE
      value: fast
    - key: TTS_BACKBONE_REPO
      value: pnnbao-ump/VieNeu-TTS
    - key: TTS_GGUF_FILENAME
      value: ""
    - key: TTS_EMOTION
      value: natural
    - key: TTS_GPU_MEM_FRACTION
      value: "0.30"
    - key: TTS_INFER_TEMPERATURE
      value: ""
    - key: TTS_INFER_TOP_K
      value: ""
    - key: TTS_MAX_CHARS
      value: ""
    - key: TTS_DEFAULT_SPEED
      value: ""
    - key: TTS_NORMALIZE_AUDIO
      value: ""
    - key: TTS_PEAK_LIMIT
      value: "0.98"
    - key: TTS_PEAK_NORMALIZE_TARGET
      value: ""
    - key: VOICE_PROFILE_BACKEND_API_URL
      value: "https://<your-backend-domain>/api"
    - key: INTERVIEW_AGENT_SHARED_SECRET
      value: "<shared-secret>"
    - key: TTS_VOICE_PROFILE_CACHE_DIR
      value: /tmp/vieneu_voice_profiles
    - key: HF_HOME
      value: /root/.cache/huggingface
  startup_commands:
    cmd:
    args:
