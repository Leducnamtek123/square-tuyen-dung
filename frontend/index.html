  <meta name="robots" content="index, follow" />

  <!-- Canonical (will be overridden per page by useSEO hook) -->

  <!-- Open Graph / Facebook -->

  <meta property="og:description" content="Square - Nền tảng tuyển dụng hàng đầu Việt Nam. Tìm kiếm hàng nghìn việc làm phù hợp, kết nối với các nhà tuyển dụng uy tín." />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@HuyBuiKhanh" />
  <meta name="twitter:title" content="Square | Tìm việc nhanh, tuyển dụng hiệu quả" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&display=swap"
    rel="stylesheet" />
  <style>
    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    #initial-loader {
      height: 100vh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: white;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.5s ease-in-out;
    }

    .loading-spinner {
      opacity: 1;
      transition: opacity 0.5s ease-in-out;
    }

    .loading-spinner img {
      width: 100px;
      height: auto;
    }

    .fade-out {
      opacity: 0 !important;
    }
  </style>
</head>

<body>
  <div id="initial-loader">
    <div class="loading-spinner">
      <img src="/loading-spinner.gif" alt="Loading" style="width: 100px; height: auto;">
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
