version: '3.8'

services:
  frontend_dev:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: project-frontend-container
    volumes:
      - .:/project_web_app
      - /project_web_app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    env_file:
      - .env
    networks:
      - project-network

  frontend_nginx:
    image: nginx:1.24.0-alpine
    container_name: project-frontend-nginx-container
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - project-network
    ports:
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend_dev

networks:
  project-network:
    name: project-network