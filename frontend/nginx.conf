server {
    listen 80;
    server_name localhost;
    
    # Increase maximum upload size
    client_max_body_size 20M;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

    # Serve built assets with long-term caching, no SPA fallback here.
    location /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Prevent caching the entry HTML so new deploys don't reference stale chunks.
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # For SPA routing
        try_files $uri $uri/ /index.html;
        # Avoid stale HTML that references deleted hashed chunks after deploy.
        add_header Cache-Control "no-store";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
