services:
  vieneu-tts:
    gpus: all
    environment:
      - TTS_DEVICE=cuda

  whisper:
    gpus: all
    environment:
      - VOXBOX_DEVICE=${VOXBOX_DEVICE:-cuda:0}

  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    gpus: all
    environment:
      - LLAMA_ARG_N_GPU_LAYERS=${LLAMA_N_GPU_LAYERS:-35}
