name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'api/**'
  pull_request:
    branches: [main]
    paths:
      - 'api/**'

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install flake8 isort

      - name: Run flake8
        run: flake8 api/ --config api/.flake8

      - name: Check import sorting
        run: isort api/ --check-only --diff

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev build-essential pkg-config

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('api/requirements.txt') }}

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install pytest pytest-django pytest-cov factory-boy

      - name: Run tests
        working-directory: api
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          SERVICE_MYSQL_HOST: 127.0.0.1
          SERVICE_MYSQL_PORT: 3306
          SERVICE_MYSQL_DB_NAME: test_db
          SERVICE_MYSQL_USER: root
          SERVICE_MYSQL_PASSWORD: testpass
          SERVICE_REDIS_HOST: 127.0.0.1
          SERVICE_REDIS_PORT: 6379
          SERVICE_REDIS_DB: 0
          SECRET_KEY: test-secret-key-ci
          DEBUG: 'True'
        run: |
          pytest --cov=apps --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t square-backend:${{ github.sha }} -f api/Dockerfile api/

      - name: Verify image
        run: docker images square-backend:${{ github.sha }}
